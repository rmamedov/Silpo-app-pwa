# Сільпо PWA — 301 redirector.
# Used on the old droplet (104.248.132.130) to permanently redirect all traffic
# to the canonical HTTPS domain on the new droplet.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 301 https://161.35.196.123.sslip.io$request_uri;
}
