# Сільпо PWA — nginx site config WITH HTTPS (Let's Encrypt).
# Used on the droplet that owns the public domain (161.35.196.123.sslip.io).
# Cert obtained with:
#   certbot certonly --webroot -w /var/www/silpo -d 161.35.196.123.sslip.io \
#     --deploy-hook "systemctl reload nginx"

# HTTP :80 — serve ACME renewals, redirect everything else to HTTPS.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 161.35.196.123.sslip.io;

    location /.well-known/acme-challenge/ { root /var/www/silpo; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS :443 — serve the app.
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name 161.35.196.123.sslip.io;

    ssl_certificate     /etc/letsencrypt/live/161.35.196.123.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/161.35.196.123.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/silpo;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: serve the file if it exists, otherwise fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # service worker must always revalidate so updates roll out
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # product media (videos) — long cache; byte-range requests are on by default
    location /media/ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # hashed build assets are immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
