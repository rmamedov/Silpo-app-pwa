# Сільпо PWA — nginx site config (single-page app + product media).
# Install: copy to /etc/nginx/sites-available/silpo, symlink into sites-enabled,
# remove the default site, then `nginx -t && systemctl reload nginx`.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/silpo;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: serve the file if it exists, otherwise fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # service worker must always revalidate so updates roll out
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # product media (videos) — long cache; byte-range requests are on by default
    location /media/ {
        add_header Cache-Control "public, max-age=2592000";
    }

    # hashed build assets are immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
